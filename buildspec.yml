version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - npm install

  pre_build:
    commands:
      - export NODE_ENV=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/node-env --query 'Parameter.Value' --output text) || true
      - export APP_NAME=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/app-name --query 'Parameter.Value' --output text) || true
      - export PORT=$(aws ssm get-parameter --name /sour-mango/$ENVIRONMENT/port --query 'Parameter.Value' --output text) || true
      - CURRENT_VERSION=$(aws lambda get-alias --function-name payment-processor --name live --query 'FunctionVersion' --output text)
      - echo "Current live version is $CURRENT_VERSION"

  build:
    commands:
      - echo "NODE_ENV=$NODE_ENV" > .env
      - echo "APP_NAME=$APP_NAME" >> .env
      - echo "PORT=$PORT" >> .env
      - zip -j lambda.zip lambda_function.py
      - npm test -- --coverage

  post_build:
    commands:
      - npm run test:smoke
      - aws lambda update-function-code --function-name payment-processor --zip-file fileb://lambda.zip
      - aws lambda wait function-updated --function-name payment-processor
      - NEW_VERSION=$(aws lambda publish-version --function-name payment-processor --query 'Version' --output text)
      - echo "New version is $NEW_VERSION"
      - mkdir -p ec2-artifact
      - cp .env ec2-artifact/
      - cp package.json ec2-artifact/
      - cp package-lock.json ec2-artifact/
      - cp server.js ec2-artifact/
      - cp smoke-test.js ec2-artifact/
      - cp index.html ec2-artifact/ 2>/dev/null || true
      - cp -r public ec2-artifact/ 2>/dev/null || true
      - cp -r scripts ec2-artifact/
      - cp appspec-ec2.yml ec2-artifact/appspec.yml
      - mkdir -p lambda-artifact
      - cp lambda.zip lambda-artifact/
      - cp appspec-lambda-template.yml lambda-artifact/appspec.yml
      - sed -i "s/CURRENT_VERSION_PLACEHOLDER/$CURRENT_VERSION/" lambda-artifact/appspec.yml
      - sed -i "s/TARGET_VERSION_PLACEHOLDER/$NEW_VERSION/" lambda-artifact/appspec.yml
      - cat lambda-artifact/appspec.yml

artifacts:
  secondary-artifacts:
    BuildArtifact:
      base-directory: ec2-artifact
      files:
        - '**/*'
    lambda-artifact:
      base-directory: lambda-artifact
      files:
        - appspec.yml
        - lambda.zip

cache:
  paths:
    - 'node_modules/**/*'
